<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 160" width="140" height="160">
  <defs>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <path d="M70 22 L108 36 L108 82 Q108 110 70 126 Q32 110 32 82 L32 36 Z"
        fill="#0D1824" stroke="url(#eyeGrad)" stroke-width="1.5" filter="url(#softGlow)"/>
  <path d="M70 30 L100 42 L100 80 Q100 103 70 116 Q40 103 40 80 L40 42 Z"
        fill="none" stroke="#00E5FF" stroke-width="0.4" opacity="0.3"/>
  <ellipse cx="70" cy="76" rx="22" ry="14" fill="#080C14" stroke="url(#eyeGrad)" stroke-width="1.2" filter="url(#glow)"/>
  <circle cx="70" cy="76" r="8" fill="url(#eyeGrad)" filter="url(#glow)"/>
  <circle cx="70" cy="76" r="3.5" fill="#080C14"/>
  <circle cx="72" cy="74" r="1.2" fill="#FFFFFF" opacity="0.8"/>
  <line x1="48" y1="76" x2="56" y2="76" stroke="#00E5FF" stroke-width="1" opacity="0.6" filter="url(#glow)"/>
  <line x1="84" y1="76" x2="92" y2="76" stroke="#00E5FF" stroke-width="1" opacity="0.6" filter="url(#glow)"/>
  <g stroke="#00E5FF" stroke-width="1.2" opacity="0.5" filter="url(#glow)">
    <polyline points="38,45 38,38 45,38"/>
    <polyline points="102,45 102,38 95,38"/>
  </g>
</svg>
