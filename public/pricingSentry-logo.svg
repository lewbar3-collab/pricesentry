<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0080FF;stop-opacity:0" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="140" height="160"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="480" height="160" fill="#080C14" rx="12"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#00E5FF" stroke-width="0.5">
    <line x1="0" y1="40" x2="480" y2="40"/>
    <line x1="0" y1="80" x2="480" y2="80"/>
    <line x1="0" y1="120" x2="480" y2="120"/>
    <line x1="40" y1="0" x2="40" y2="160"/>
    <line x1="80" y1="0" x2="80" y2="160"/>
    <line x1="120" y1="0" x2="120" y2="160"/>
  </g>

  <!-- === ICON MARK === -->
  <!-- Shield base -->
  <path d="M70 22 L108 36 L108 82 Q108 110 70 126 Q32 110 32 82 L32 36 Z"
        fill="#0D1824" stroke="url(#eyeGrad)" stroke-width="1.5" filter="url(#softGlow)"/>

  <!-- Shield inner accent lines -->
  <path d="M70 30 L100 42 L100 80 Q100 103 70 116 Q40 103 40 80 L40 42 Z"
        fill="none" stroke="#00E5FF" stroke-width="0.4" opacity="0.3"/>

  <!-- Eye socket / lens shape inside shield -->
  <ellipse cx="70" cy="76" rx="22" ry="14" fill="#080C14" stroke="url(#eyeGrad)" stroke-width="1.2" filter="url(#glow)"/>

  <!-- Iris -->
  <circle cx="70" cy="76" r="8" fill="url(#eyeGrad)" filter="url(#glow)"/>

  <!-- Pupil -->
  <circle cx="70" cy="76" r="3.5" fill="#080C14"/>

  <!-- Pupil reflection -->
  <circle cx="72" cy="74" r="1.2" fill="#FFFFFF" opacity="0.8"/>

  <!-- Eye scan lines -->
  <line x1="48" y1="76" x2="56" y2="76" stroke="#00E5FF" stroke-width="1" opacity="0.6" filter="url(#glow)"/>
  <line x1="84" y1="76" x2="92" y2="76" stroke="#00E5FF" stroke-width="1" opacity="0.6" filter="url(#glow)"/>

  <!-- Corner tick marks on shield -->
  <g stroke="#00E5FF" stroke-width="1.2" opacity="0.5" filter="url(#glow)">
    <polyline points="38,45 38,38 45,38"/>
    <polyline points="102,45 102,38 95,38"/>
  </g>

  <!-- Tiny price tag / £ symbol below eye -->
  <text x="70" y="103" text-anchor="middle" font-family="monospace" font-size="9" fill="#00E5FF" opacity="0.5" filter="url(#glow)">£ $ €</text>

  <!-- === WORDMARK === -->
  <!-- PRICING -->
  <text x="148" y="82"
        font-family="'Courier New', 'Courier', monospace"
        font-size="42"
        font-weight="700"
        letter-spacing="-1"
        fill="#FFFFFF">PRICING</text>

  <!-- SENTRY — cyan accent -->
  <text x="148" y="124"
        font-family="'Courier New', 'Courier', monospace"
        font-size="42"
        font-weight="700"
        letter-spacing="-1"
        fill="url(#eyeGrad)"
        filter="url(#glow)">SENTRY</text>

  <!-- Tagline -->
  <text x="150" y="143"
        font-family="'Courier New', monospace"
        font-size="9"
        letter-spacing="3"
        fill="#7DD8F0"
        opacity="0.9">COMPETITOR PRICE INTELLIGENCE</text>

  <!-- Decorative scan line accent to the right of wordmark -->
  <g opacity="0.25" stroke="#00E5FF" stroke-width="0.8">
    <line x1="460" y1="68" x2="460" y2="128"/>
    <line x1="456" y1="68" x2="464" y2="68"/>
    <line x1="456" y1="128" x2="464" y2="128"/>
  </g>

</svg>
